<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Serviço Indisponível</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #fff;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 15% 25%, rgba(249,115,22,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 75%, rgba(239,68,68,0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    .container {
      text-align: center;
      padding: 2.5rem 2rem;
      max-width: 620px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    /* Cloudflare logo */
    .cf-logo {
      margin-bottom: 2rem;
      opacity: 0.85;
    }

    .cf-logo svg {
      width: 56px;
      height: 56px;
      filter: drop-shadow(0 0 18px rgba(249,115,22,0.4));
    }

    /* Pulsing status dot */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 999px;
      padding: 0.35rem 0.9rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #fca5a5;
      margin-bottom: 2rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    h1 {
      font-size: clamp(1.5rem, 4.5vw, 2.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.25;
      margin-bottom: 1.25rem;
      color: #f1f5f9;
    }

    .message-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(12px);
    }

    .message-box p {
      font-size: 1rem;
      color: #94a3b8;
      line-height: 1.7;
    }

    .message-box p strong {
      color: #e2e8f0;
      font-weight: 600;
    }

    /* Info row */
    .info-row {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }

    .info-chip {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      color: #64748b;
    }

    .info-chip .chip-icon { font-size: 1rem; }

    /* Status link */
    .status-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: #f97316;
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      border-bottom: 1px solid rgba(249,115,22,0.3);
      padding-bottom: 1px;
      transition: color 0.2s, border-color 0.2s;
    }

    .status-link:hover {
      color: #fb923c;
      border-color: rgba(251,146,60,0.5);
    }

    footer {
      margin-top: 3rem;
      font-size: 0.72rem;
      color: #1e293b;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Cloudflare orange cloud icon (inline SVG) -->
  <div class="cf-logo">
    <svg viewBox="0 0 200 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M152 84.5c1.2-4.1 0.8-7.8-1.1-10.6-1.8-2.6-4.7-4.2-8.2-4.5l-1.1-0.1
               c0.6-2.5 0.5-5-0.4-7.2-1.4-3.5-4.5-6-8.5-7
               C131 47.5 122.8 40 112.5 40c-7.4 0-14 3.5-18.2 9
               -1.8-0.8-3.8-1.2-5.9-1.2-6.5 0-12 4.5-13.3 10.7
               -0.4-0.1-0.9-0.1-1.3-0.1-8.3 0-15 6.7-15 15 0 0.4 0 0.8 0.1 1.1H152z"
            fill="#F6821F"/>
      <path d="M160.5 70.5c-0.3 0-0.5 0-0.8 0
               c0.2-0.9 0.3-1.8 0.3-2.8 0-7.4-6-13.5-13.5-13.5
               -1.5 0-2.9 0.2-4.2 0.7-1.9-6.7-8-11.5-15.3-11.5
               -8.8 0-16 7.2-16 16 0 0.7 0 1.3 0.1 2
               -0.5-0.1-1-0.1-1.5-0.1-6.6 0-12 5.4-12 12s5.4 12 12 12h51
               c5.5 0 10-4.5 10-10 0-5.2-4-9.5-9.1-9.8z"
            fill="#FBAD41"/>
    </svg>
  </div>

  <div class="status-badge">
    <span class="dot"></span>
    Incidente ativo
  </div>

  <h1>Website Temporariamente Indisponível</h1>

  <div class="message-box">
    <p>
      Devido a uma <strong>indisponibilidade global nos serviços Cloudflare</strong>,
      o website encontra-se temporariamente inacessível.<br><br>
      Voltaremos assim que possível. Pedimos desculpa pelo incómodo.
    </p>
  </div>

  <footer>© <script>document.write(new Date().getFullYear())</script> — Todos os direitos reservados.</footer>
</div>

</body>
</html>
